{% extends 'base.html' %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>{{ heading }}</h2>
        <p>{{ subtitle }}</p>
    </div>
    <div class="page-actions">
        <a href="{{ back_url }}" class="btn btn-secondary">Voltar</a>
    </div>
</div>

<div class="form-shell">
    <div class="card form-card">
        <div class="card-body p-4 p-lg-5">
            <div class="row justify-content-center text-center g-4">
                <div class="col-lg-8">
                    <div class="mb-4">
                        <h4 class="mb-3">QR Code</h4>
                        <img
                            src="{{ qr_code_data_uri }}"
                            alt="QR Code de acesso r&aacute;pido"
                            class="img-fluid border rounded-4 bg-white p-3 shadow-sm"
                            style="max-width: 320px;"
                        >
                    </div>

                    <div class="row g-3 justify-content-center mb-4">
                        {% for label, value in details %}
                        <div class="col-sm-6">
                            <div class="border rounded-4 p-3 h-100 bg-light-subtle">
                                <div class="small text-muted text-uppercase mb-1">{{ label }}</div>
                                <div class="fw-semibold">{{ value }}</div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>

                    <div class="border rounded-4 p-3 text-start bg-light">
                        <div class="small text-muted text-uppercase mb-2">URL utilizada</div>
                        <div class="text-break">{{ target_url }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
