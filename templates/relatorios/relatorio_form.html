{% extends 'base.html' %}

{% block title %}Relatórios{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>Relatórios em PDF</h2>
        <p>Configure filtros e exporte relatórios com o mesmo comportamento atual.</p>
    </div>
</div>

<div class="card form-card">
    <div class="card-header">
        <h5 class="mb-0"><i class="fas fa-file-pdf me-2"></i>Parâmetros do relatório</h5>
    </div>
    <div class="card-body">
        <form method="get" action="{% url 'relatorios:gerar_pdf' %}" class="row g-3">
            <div class="col-md-6">
                <label for="periodo" class="form-label">Período</label>
                <select id="periodo" name="periodo" class="form-select">
                    <option value="semana_atual">Semana atual</option>
                    <option value="ultima_semana">Última semana</option>
                    <option value="intervalo">Intervalo personalizado</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="data_inicio" class="form-label">Data de início</label>
                <input type="date" id="data_inicio" name="data_inicio" class="form-control">
            </div>
            <div class="col-md-3">
                <label for="data_fim" class="form-label">Data de fim</label>
                <input type="date" id="data_fim" name="data_fim" class="form-control">
            </div>
            <div class="col-md-4">
                <label for="sala" class="form-label">Sala</label>
                <select id="sala" name="sala" class="form-select">
                    <option value="">Todas</option>
                    {% for sala in salas %}
                    <option value="{{ sala.id }}">{{ sala.numero }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label for="estado" class="form-label">Estado</label>
                <select id="estado" name="estado" class="form-select">
                    <option value="">Todos</option>
                    {% for valor, rotulo in estado_choices %}
                    <option value="{{ valor }}">{{ rotulo }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label for="prioridade" class="form-label">Prioridade</label>
                <select id="prioridade" name="prioridade" class="form-select">
                    <option value="">Todas</option>
                    {% for valor, rotulo in prioridade_choices %}
                    <option value="{{ valor }}">{{ rotulo }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label for="tipo" class="form-label">Tipo</label>
                <select id="tipo" name="tipo" class="form-select">
                    <option value="">Todos</option>
                    {% for valor, rotulo in tipo_choices %}
                    <option value="{{ valor }}">{{ rotulo }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-12 form-row-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-file-arrow-down me-2"></i>Gerar PDF
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
